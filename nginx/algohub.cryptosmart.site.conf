# algohub.cryptosmart.site — هر دو اپ زیرِ یک ساب‌دامنه (بدون دست‌زدن به دیتابیس‌ها).
#
#   /                    → پورتفولیو            (FastAPI  127.0.0.1:8000)
#   /static/             → استاتیکِ پورتفولیو    (از دیسک)
#   /journal/            → تریدینگ‌ژورنال فرانت  (Next.js  127.0.0.1:3001، basePath=/journal)
#   /journal/api/        → تریدینگ‌ژورنال بک‌اند (FastAPI  127.0.0.1:8001 → /api/)
#   /journal/uploads/    → تصاویرِ آپلودیِ ژورنال (127.0.0.1:8001 → /uploads/)
#
# نصب روی سرور:
#   cp deploy/nginx/algohub.cryptosmart.site.conf /etc/nginx/sites-available/
#   ln -s /etc/nginx/sites-available/algohub.cryptosmart.site.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d algohub.cryptosmart.site        # گواهی TLS
#
# ⚠️ این فایل فقط ساب‌دامنهٔ algohub را می‌سازد؛ به cryptosmart.site و بقیهٔ
#    server block ها هیچ کاری ندارد. پورت‌های pm2 تغییری نمی‌کنند
#    (cryptosmart-portfolio=8000، tj-frontend=3001، tj-backend=8001).

server {
    listen 80;
    listen [::]:80;
    server_name algohub.cryptosmart.site;

    client_max_body_size 15M;   # آپلودِ اسکرین‌شاتِ معاملات (ژورنال)

    # ── تریدینگ ژورنال: بک‌اند API (پیشونددار) → بک‌اند روی /api/ می‌نشیند ──
    location /journal/api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── تریدینگ ژورنال: تصاویرِ آپلودی ──
    location /journal/uploads/ {
        proxy_pass http://127.0.0.1:8001/uploads/;
        proxy_set_header Host $host;
    }

    # ── تریدینگ ژورنال: فرانت‌اندِ Next.js (basePath=/journal؛ مسیر کامل حفظ می‌شود) ──
    location /journal/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # بدونِ اسلشِ انتهایی هم مستقیماً به Next پراکسی شود (نه ریدایرکت!).
    # Next به‌صورت پیش‌فرض «/journal» (بدون اسلش) را کانونیکال می‌داند و خودش
    # «/journal/» را با ۳۰۸ به «/journal» ریدایرکت می‌کند؛ اگر این‌جا هم ریدایرکتِ
    # عکسش را بزنیم (اسلش را اضافه کنیم)، بینِ این دو یک حلقهٔ بی‌نهایت ساخته
    # می‌شود (/journal → /journal/ → /journal → …). پس باید مستقیم پراکسی شود.
    location = /journal {
        proxy_pass http://127.0.0.1:3001/journal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── پورتفولیو: فایل‌های استاتیک مستقیم از دیسک ──
    location /static/ {
        alias /var/www/portfolio/app/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── پورتفولیو: بقیهٔ مسیرها (روتِ دامنه) ──
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
