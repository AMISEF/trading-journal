# pnl.cryptosmart.site — standalone live PnL showcase for Algo Smart bots.
#
#   /        → Next.js  127.0.0.1:3012  (tj-pnl-frontend, distDir=.next-pnl)
#   /api/    → FastAPI  127.0.0.1:8001/api/  (shared trading-journal backend)
#
# ⚠️ Only creates this subdomain. Does not touch cryptosmart.site, algohub,
#    portfolio, or other server blocks / ports (3000, 3001, 8000, 8001).
#
# Install:
#   cp nginx/pnl.cryptosmart.site.conf /etc/nginx/sites-available/
#   ln -s /etc/nginx/sites-available/pnl.cryptosmart.site.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d pnl.cryptosmart.site

server {
    server_name pnl.cryptosmart.site;

    client_max_body_size 5M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript
        application/xml+rss application/atom+xml image/svg+xml font/woff font/woff2;

    # Public team API — same backend as /journal/api (read-only public endpoints).
    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3012;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 80;
    listen [::]:80;
}
