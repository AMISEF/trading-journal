# Nginx server block for trading-journal.cryptosmart.site
# Place at: /etc/nginx/sites-available/trading-journal
# Then: ln -s /etc/nginx/sites-available/trading-journal /etc/nginx/sites-enabled/
# This is a SEPARATE block — it does not touch the existing cryptosmart.site config.
#
#   /api/*  ->  FastAPI backend (uvicorn) on 127.0.0.1:8001
#   /*      ->  Next.js frontend on 127.0.0.1:3001
#
# Certbot will add the SSL (443) section automatically when you run:
#   certbot --nginx -d trading-journal.cryptosmart.site

server {
    listen 80;
    server_name trading-journal.cryptosmart.site;

    client_max_body_size 15M;   # allow trade screenshot uploads

    # ── Backend API ──
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Uploaded images served by backend ──
    location /uploads/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    # ── Frontend (Next.js) ──
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
