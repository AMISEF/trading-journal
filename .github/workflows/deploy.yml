name: Deploy Trading Journal to VPS

# Deploys ONLY the trading-journal app. The existing cryptosmart.site site
# is untouched — it lives in its own folder, PM2 process, and Nginx block.

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            echo "▶ Moving to project directory..."
            cd /var/www/trading-journal

            echo "▶ Syncing to origin/main (hard reset so stray on-server edits never block the deploy)..."
            git fetch origin main
            git reset --hard origin/main
            # NOTE: only tracked files are reset — untracked files like backend/.env
            # and the uploads/ folder are left untouched (no git clean here).
            echo "▶ Last commit:"
            git log -1 --oneline

            # ───── Backend (FastAPI / uvicorn) ─────
            echo "▶ Backend: installing deps..."
            cd /var/www/trading-journal/backend
            python3 -m venv venv 2>/dev/null || true
            ./venv/bin/pip install --upgrade pip
            ./venv/bin/pip install -r requirements.txt
            echo "▶ Backend: restarting PM2..."
            pm2 restart tj-backend || pm2 start ecosystem.config.js

            # ───── Frontend (Next.js) ─────
            echo "▶ Frontend: installing deps..."
            cd /var/www/trading-journal/frontend
            npm install

            # journal build (algohub.cryptosmart.site/journal — basePath=/journal, distDir=.next)
            echo "▶ Frontend (journal): building..."
            npm run build
            echo "▶ Frontend (journal): restarting PM2..."
            pm2 restart tj-frontend || pm2 start ecosystem.config.js --only tj-frontend

            # pnl build (pnl.cryptosmart.site — root, SITE_MODE=pnl, distDir=.next-pnl)
            # Built into a separate distDir so it never overwrites the journal build.
            echo "▶ Frontend (pnl): building..."
            NODE_OPTIONS=--max-old-space-size=2048 \
            NEXT_PUBLIC_SITE_MODE=pnl \
            NEXT_PUBLIC_BASE_PATH= \
            NEXT_PUBLIC_API_BASE=/api \
            NEXT_DIST_DIR=.next-pnl \
            npm run build
            echo "▶ Frontend (pnl): restarting PM2..."
            pm2 restart tj-pnl-frontend --update-env || pm2 start ecosystem.config.js --only tj-pnl-frontend

            pm2 save
            echo "✅ Deploy complete — https://trading-journal.cryptosmart.site + https://pnl.cryptosmart.site"
